<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Guest Guide</title>
<style>
    :root {
      --bg: #f6f6f6;
      --card: #ffffff;
      --text: #111111;
      --muted: #666666;
      --border: #dddddd;
      --button: #eeeeee;
      --button-hover: #e2e2e2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    main {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 7vw, 38px);
      line-height: 1.1;
      font-weight: 700;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 16px;
    }

    .buttons {
      display: grid;
      gap: 12px;
    }

    a {
      display: block;
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      background: var(--button);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.25;
    }

    a:hover,
    a:focus {
      background: var(--button-hover);
      outline: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
        align-items: flex-start;
      }

      main {
        margin-top: 18px;
        padding: 24px 14px;
        border-radius: 20px;
      }

      a {
        padding: 16px 12px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
<main>
<h1>Guest Guide</h1>
<p>Please select your property.</p>
<div class="buttons"><a href="chiyo-guide.html">Miniloft Chiyo</a><a href="hakata-guide.html">Miniloft Hakata</a><a href="nakasu-guide.html">Miniloft Nakasu</a><a href="nanba-guide.html">Miniloft Nanba</a><a href="ropponmatsu-guide.html">Miniloft Roppongmatsu</a></div>
</main>
</body>
</html>
